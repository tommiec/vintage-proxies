services:
  webone:
    image: u306060/webone:latest
    container_name: webone
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8091:8080"
    environment:
      - TZ=${TZ:-Europe/Brussels}
      - SERVICE_PORT=8080
      - CONFIG_PATH=/etc/webone/webone.conf
      - PROXY_HOSTNAME=${PROXY_HOSTNAME:?set PROXY_HOSTNAME in .env}
    security_opt:
      - no-new-privileges:true
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - proxynet

  cryanc:
    image: ghcr.io/tommiec/cryanc-carl:latest
    container_name: cryanc
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8767:8765"
    environment:
      - CARL_PORT=8765
      - CARL_OPTS=-p -t
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - proxynet

  macproxy:
    image: rdmark/macproxy:latest
    container_name: macproxy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5003:5001"
    security_opt:
      - no-new-privileges:true
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - proxynet

networks:
  proxynet:
    name: proxynet
    driver: bridge
