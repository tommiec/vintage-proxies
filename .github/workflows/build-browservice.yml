name: Build browservice

on:
  push:
    branches: [main]
    paths:
      - 'browservice/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: browservice
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/browservice:latest
